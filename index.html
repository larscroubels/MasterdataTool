<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MASTERDATA TOOL IZEGEM 🔧</title>
  <style>
    :root {
      --primary: #1e293b;
      --accent: #009639;
      --accent-hover: #007a2e;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #334155;
      --border: #e2e8f0;
      --tab-bg: #f1f5f9;
      --subtle-text: #64748b;
    }

    /* Teams Dark Mode */
    [data-theme="dark"] {
      --primary: #ffffff;
      --bg: #11100f;
      --card: #1f1f1f;
      --text: #f5f5f5;
      --border: #323130;
      --tab-bg: #292929;
      --subtle-text: #adadad;
    }

    body {
      font-family: 'Segoe UI', 'Inter', sans-serif;
      text-transform: uppercase;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
      transition: background-color 0.3s ease;
    }

    .theme-switch-wrapper {
      position: absolute;
      top: 20px;
      right: 20px;
      cursor: pointer;
      z-index: 100;
      background: var(--card);
      padding: 10px;
      border-radius: 50%;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      border: 1px solid var(--border);
    }

    .container {
      background: var(--card);
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 1100px;
      border: 1px solid var(--border);
    }

    h2 { text-align: center; margin-bottom: 35px; font-weight: 900; letter-spacing: 2px; }

    .nav-tabs {
      display: flex;
      background: var(--tab-bg);
      padding: 6px;
      border-radius: 10px;
      margin-bottom: 35px;
      gap: 5px;
      border: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      padding: 14px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text);
      font-weight: 800;
      border-radius: 6px;
    }

    .tab-btn.active {
      background: var(--card);
      color: var(--accent);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .section { display: none; }
    .section.active { display: block; }

    .grid-fields {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    label { margin-bottom: 8px; font-weight: 900; font-size: 0.8rem; display: block; }
    
    select {
      width: 100%;
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background-color: var(--tab-bg);
      color: var(--text);
      font-weight: 600;
      text-transform: uppercase;
    }

    [data-theme="dark"] select { background-color: #292929; color: white; }

    .btn-calc {
      width: 100%; padding: 18px; background: var(--accent); color: white; border: none;
      border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 1.1rem;
    }

    .results-container { margin-top: 40px; overflow-x: auto; border-radius: 8px; border: 2px solid var(--border); }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { background: var(--tab-bg); padding: 16px; font-size: 0.75rem; border-bottom: 2px solid var(--border); }
    [data-theme="dark"] th { background: #252423; }
    td { padding: 18px 16px; font-weight: 700; border-bottom: 1px solid var(--border); }

    .badge-size { padding: 8px 15px; background: #f0fdf4; color: #009639; border-radius: 8px; font-family: monospace; font-size: 1.2rem; }
    [data-theme="dark"] .badge-size { background: #004d1f; color: #ffffff; }

    .calc-btn {
      cursor: pointer; background: #1e293b; border: none; padding: 8px 12px; 
      border-radius: 6px; font-weight: 900; font-size: 0.7rem; color: #ffffff; 
      display: flex; align-items: center; gap: 8px; transition: 0.2s;
    }
    .calc-btn:hover { background: var(--accent); }
  </style>
</head>

<body>
  <div class="theme-switch-wrapper" onclick="toggleTheme()">
    <span id="theme-icon">☀️</span>
  </div>

  <div class="container">
    <h2>🔧 MASTERDATA TOOL IZEGEM</h2>
    <nav class="nav-tabs">
      <button id="btn-dyn" class="tab-btn active" onclick="switchTab('dyn')">DYNAMISCH</button>
      <button id="btn-fix" class="tab-btn" onclick="switchTab('fix')">FLOW RACKS</button>
      <button id="btn-afm" class="tab-btn" onclick="switchTab('afm')">AFMETINGEN FLOW RACKS</button>
      <button id="btn-gv" class="tab-btn" onclick="switchTab('gv')">ZWAAR GOED</button>
    </nav>

    <div id="sec-dyn" class="section active">
      <div class="grid-fields">
        <div class="field"><label>ZONE</label><select id="dynZone">
          <option value="D420">APO CYTO (D420)</option>
          <option value="D421">APO BOIRON (D421)</option>
        </select></div>
        <div class="field"><label>BBD</label><select id="dynBBD"><option value="nee">NEE</option><option value="ja">JA</option></select></div>
      </div>
      <button class="btn-calc" onclick="alert('Masterdata gegenereerd!')">GEGEVENS GENEREREN</button>
    </div>

    <div id="sec-fix" class="section">
      <div class="grid-fields">
        <div class="field"><label>1. ZONE</label><select id="fixZone" onchange="filterKleur()">
          <option value="">KIES...</option>
          <option value="2200A-2700A">2200A-2700A</option>
          <option value="AISLE22-23-AFR">AISLE 22-23 (AFR)</option>
          <option value="AISLE22-23-CON">AISLE 22-23 (CON)</option>
        </select></div>
        <div class="field"><label>2. KLEUR</label><select id="fixKleur" disabled onchange="filterVerpakking()"><option value="">...</option></select></div>
        <div class="field"><label>3. GEWENSTE LV</label><select id="fixVerpakking" disabled onchange="filterLiggers()"><option value="">...</option></select></div>
        <div class="field"><label>4. LIGGER(S)</label><select id="fixLigger" disabled><option value="">...</option></select></div>
      </div>
      <button class="btn-calc" onclick="calcFix()">GEGEVENS GENEREREN</button>
      <div id="out-fix" class="results-container" style="display:none;">
        <table id="table-fix"><thead><tr><th>HD TYPE</th><th>LOC SIZE</th><th>STORAGE</th><th>ITEM GROUP</th></tr></thead><tbody id="res-body-fix"></tbody></table>
      </div>
    </div>

    <div id="sec-afm" class="section">
      <div class="grid-fields">
        <div class="field"><label>1. ZONE</label><select id="afmZone" onchange="updateAfmLiggers()">
          <option value="">KIES ZONE...</option>
          <option value="2200A-2700A">2200A-2700A</option>
          <option value="3700B-3200B">3700B-3200B</option>
          <option value="3700A-3200A">3700A-3200A</option>
          <option value="4200A-5200A">4200A-5200A</option>
          <option value="20DOZEN">20 DOZEN AISLE</option>
          <option value="AFRAME">AFRAME</option>
        </select></div>
        <div class="field"><label>2. LIGGER(S)</label><select id="afmLigger" disabled><option value="">...</option></select></div>
      </div>
      <button class="btn-calc" onclick="calcAfm()">TOON AFMETING</button>
      <div id="out-afm" class="results-container" style="display:none;">
        <table><thead><tr><th>ZONE</th><th>LIGGER(S)</th><th>AFMETING</th></tr></thead><tbody id="res-body-afm"></tbody></table>
      </div>
    </div>

    <div id="sec-gv" class="section">
      <h3 style="text-align:center; opacity:0.5;">ZWAAR GOED CONFIGURATIE</h3>
    </div>
  </div>

  <script>
    function toggleTheme() {
      const r = document.documentElement;
      const icon = document.getElementById('theme-icon');
      if (r.getAttribute('data-theme') === 'dark') {
        r.setAttribute('data-theme', 'light');
        icon.innerText = '☀️';
      } else {
        r.setAttribute('data-theme', 'dark');
        icon.innerText = '🌙';
      }
    }

    function switchTab(t) {
      document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('sec-' + t).classList.add('active');
      document.getElementById('btn-' + t).classList.add('active');
    }

    const afmData = { 
      "2200A-2700A": { name: "2200A-2700A", liggers: { "1-6": "245 cm" } },
      "3700B-3200B": { name: "3700B-3200B", liggers: { "1-8": "147 cm" } },
      "3700A-3200A": { name: "3700A-3200A", liggers: { "1, 3, 5": "196 cm", "2, 4, 6, 7": "245 cm" } },
      "4200A-5200A": { name: "4200A-5200A", liggers: { "1, 3, 5": "196 cm", "2, 4, 6, 7": "294 cm" } },
      "20DOZEN": { name: "20 DOZEN AISLE", liggers: { "1": "409 cm", "2-5": "394 cm" } },
      "AFRAME": { name: "AFRAME", liggers: { "1-5": "394 cm" } } 
    };

    const fixData = [
      { z: "2200A-2700A", l: "1-6", k: "ROOD", s: "009", hd: "RED" },
      { z: "AISLE22-23-AFR", l: "1-5", k: "CRT", s: "006", ig: "AFR" },
      { z: "AISLE22-23-CON", l: "1-5", k: "CRT", s: "006", ig: "CON" }
    ];

    function filterKleur() {
      const z = document.getElementById('fixZone').value;
      const kSel = document.getElementById('fixKleur');
      kSel.innerHTML = '<option value="">KLEUR...</option>';
      const kleuren = [...new Set(fixData.filter(d => d.z === z).map(d => d.k))];
      kleuren.forEach(k => kSel.add(new Option(k, k)));
      kSel.disabled = false;
    }

    function filterVerpakking() {
      const z = document.getElementById('fixZone').value;
      const vSel = document.getElementById('fixVerpakking');
      vSel.innerHTML = '<option value="">KEUZE...</option>';
      const opts = z.startsWith("AISLE") ? ["CRT SSL", "CRT LSL", "RED", "BLU"] : ["BAK", "KARTON"];
      opts.forEach(v => vSel.add(new Option(v, v)));
      vSel.disabled = false;
    }

    function filterLiggers() {
      const z = document.getElementById('fixZone').value;
      const k = document.getElementById('fixKleur').value;
      const lSel = document.getElementById('fixLigger');
      lSel.innerHTML = '<option value="">LIGGER(S)...</option>';
      fixData.filter(d => d.z === z && d.k === k).forEach(m => {
        lSel.add(new Option("LIGGERS " + m.l, m.l));
      });
      lSel.disabled = false;
    }

    function calcFix() {
      const z = document.getElementById('fixZone').value;
      const l = document.getElementById('fixLigger').value;
      const v = document.getElementById('fixVerpakking').value;
      const m = fixData.find(d => d.z === z && d.l === l);
      if(m) {
        document.getElementById('out-fix').style.display = 'block';
        document.getElementById('res-body-fix').innerHTML = `<tr><td>${v}</td><td>CRT</td><td>${m.s}</td><td>${m.ig || 'CON'}</td></tr>`;
      }
    }

    function updateAfmLiggers() {
      const zKey = document.getElementById('afmZone').value;
      const lSel = document.getElementById('afmLigger');
      lSel.innerHTML = '<option value="">KIES LIGGER(S)...</option>';
      if (zKey && afmData[zKey]) {
        Object.keys(afmData[zKey].liggers).forEach(l => {
          const label = (l.includes('-') || l.includes(',')) ? "LIGGERS " + l : "LIGGER " + l;
          lSel.add(new Option(label, l));
        });
        lSel.disabled = false;
      }
    }

    function calcAfm() {
      const zKey = document.getElementById('afmZone').value;
      const lKey = document.getElementById('afmLigger').value;
      if (!zKey || !lKey) return;
      const afmTxt = afmData[zKey].liggers[lKey];
      const totaalCm = parseInt(afmTxt);
      const label = (lKey.includes('-') || lKey.includes(',')) ? "LIGGERS " + lKey : "LIGGER " + lKey;
      document.getElementById('out-afm').style.display = 'block';
      document.getElementById('res-body-afm').innerHTML = `
        <tr><td>${afmData[zKey].name}</td><td>${label}</td>
        <td><div style="display:flex;align-items:center;gap:15px;">
          <span class="badge-size">${afmTxt}</span>
          <button class="calc-btn" onclick="openCalc(${totaalCm})">📏 BEREKEN CAPACITEIT</button>
        </div></td></tr>`;
    }

    function openCalc(rekBreedte) {
      const breedte = prompt("BREEDTE DOOS (CM)?");
      if (breedte > 0) alert("ER PASSEN MAXIMAAL " + Math.floor(rekBreedte / breedte) + " DOZEN OP DEZE LIGGER.");
    }
  </script>
</body>
</html>
